<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>House of Motret - Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body, html {
      height: 100%;
      overflow: hidden;
      background: #fdf6ee;
      font-family: 'Cormorant Garamond', serif;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }

    /* SPLASH SCREEN */
    #splash {
      position: fixed;
      inset: 0;
      background: #fdf6ee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 10;
      transition: opacity 0.8s ease;
    }

    #splash .flower {
      font-size: 52px;
      animation: bloom 1.5s ease-in-out infinite alternate;
    }

    @keyframes bloom {
      from { transform: scale(0.9); opacity: 0.7; }
      to { transform: scale(1.1); opacity: 1; }
    }

    #splash .brand {
      font-size: 28px;
      font-weight: 300;
      color: #2a1f1a;
      letter-spacing: 3px;
    }

    #splash .brand em { color: #b8956a; font-style: italic; }

    #splash .loading-dots {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    #splash .dot {
      width: 6px;
      height: 6px;
      background: #c97b8a;
      border-radius: 50%;
      animation: pulse 1.2s ease-in-out infinite;
    }

    #splash .dot:nth-child(2) { animation-delay: 0.2s; }
    #splash .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.4); opacity: 1; }
    }

    /* ERROR STATE */
    #errorState {
      display: none;
      position: fixed;
      inset: 0;
      background: #fdf6ee;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      text-align: center;
      padding: 40px;
    }

    #errorState .err-icon { font-size: 48px; }

    #errorState h2 {
      font-size: 24px;
      font-weight: 400;
      color: #2a1f1a;
      letter-spacing: 1px;
    }

    #errorState p {
      font-size: 14px;
      color: #6b4c3b;
      line-height: 1.6;
      font-family: sans-serif;
    }
  </style>
</head>
<body>

  <div id="splash">
    <div class="flower">🌸</div>
    <div class="brand">House of <em>Motret</em></div>
    <div class="loading-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <div id="errorState">
    <div class="err-icon">🌿</div>
    <h2>Link Tidak Valid</h2>
    <p>Pastikan Anda membuka link yang diberikan oleh fotografer. Hubungi House of Motret jika ada kendala.</p>
  </div>

  <iframe id="galleryFrame"></iframe>

  <script>
    // ⬇️ GANTI URL INI DENGAN LINK WEB APP GOOGLE APPS SCRIPT LO
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwq6AW_PJtKd_qlAXA14OrlbpzfR0j6rWR8v473YVglYwgeHxiRBzLMyOOvCuLC6Fa4zA/exec";

    window.onload = function() {
      const params = window.location.search;
      const splash = document.getElementById('splash');
      const frame = document.getElementById('galleryFrame');
      const errState = document.getElementById('errorState');

      if (params && params.includes('id=')) {
        frame.src = GOOGLE_SCRIPT_URL + params;
        frame.onload = function() {
          setTimeout(() => {
            splash.style.opacity = '0';
            setTimeout(() => {
              splash.style.display = 'none';
              frame.style.display = 'block';
            }, 800);
          }, 600);
        };
      } else {
        splash.style.display = 'none';
        errState.style.display = 'flex';
      }
    };
  </script>

</body>
</html>
